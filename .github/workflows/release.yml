name: release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'The tag version to release (e.g., v0.1.24)'
        required: true

permissions: {}

jobs:
  goreleaser:
    runs-on: ubuntu-latest

    permissions:
      contents: write      # Create GH releases
      id-token: write      # Ephemeral keys signing
      attestations: write  # Write GH attestations

    steps:
      - name: Delete tooling cache
        run: |
          ls -lah /opt/hostedtoolcache
          rm -rf /opt/hostedtoolcache

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: stable
          cache: false

      - name: Install Cosign
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 #v4.1.0

      - name: Tag locally
        run: |
          git tag ${{ github.event.inputs.tag_name }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean --draft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest release artefacts
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: "dist/slsactl*"

      - name: Publish Release
        run: gh release edit ${{ github.event.inputs.tag_name }} --draft=false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
